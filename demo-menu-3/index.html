<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tacos El Volcán — Food Truck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0d0510;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      user-select: none;
    }

    .stage {
      width: 100%; height: 100%;
      position: relative;
      background:
        radial-gradient(circle at 20% 30%, rgba(236, 72, 153, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(251, 146, 60, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.3) 0%, transparent 60%),
        #0d0510;
    }

    /* Animated mesh background */
    .mesh {
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent 0, transparent 80px, rgba(255,255,255,0.02) 80px, rgba(255,255,255,0.02) 82px),
        repeating-linear-gradient(-45deg, transparent 0, transparent 80px, rgba(255,255,255,0.02) 80px, rgba(255,255,255,0.02) 82px);
      animation: meshMove 60s linear infinite;
    }
    @keyframes meshMove {
      from { transform: translate(0, 0); }
      to { transform: translate(80px, 80px); }
    }

    /* Header */
    .header {
      position: relative;
      padding: 3vh 5vw 1vh;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 5;
    }
    .brand {
      display: flex; align-items: center; gap: 16px;
    }
    .brand-emoji {
      font-size: 7vh;
      filter: drop-shadow(0 0 20px rgba(251, 146, 60, 0.6));
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    .brand-text .name {
      font-family: 'Bungee', cursive;
      font-size: 5vh;
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 50%, #ec4899 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      line-height: 1;
    }
    .brand-text .sub {
      font-size: 1.6vh;
      color: #fb923c;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 800;
      margin-top: 4px;
    }
    .category-tag {
      font-family: 'Bungee', cursive;
      font-size: 3vh;
      padding: 1.2vh 2.5vw;
      background: linear-gradient(135deg, #ec4899 0%, #f97316 100%);
      color: white;
      border-radius: 999px;
      box-shadow: 0 0 30px rgba(236, 72, 153, 0.5);
      transform: rotate(-2deg);
      letter-spacing: 1px;
      animation: tagPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes tagPop {
      from { opacity: 0; transform: rotate(-2deg) scale(0.5); }
      to { opacity: 1; transform: rotate(-2deg) scale(1); }
    }

    /* Items grid */
    .items {
      position: relative;
      padding: 2vh 5vw;
      height: calc(100% - 18vh);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2vh 2vw;
      z-index: 5;
    }
    .item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      animation: itemSlide 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation-fill-mode: both;
      position: relative;
    }
    .item:nth-child(1) { animation-delay: 0.05s; }
    .item:nth-child(2) { animation-delay: 0.15s; }
    .item:nth-child(3) { animation-delay: 0.25s; }
    .item:nth-child(4) { animation-delay: 0.35s; }
    .item:nth-child(5) { animation-delay: 0.45s; }
    .item:nth-child(6) { animation-delay: 0.55s; }
    @keyframes itemSlide {
      from { opacity: 0; transform: translateY(30px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .item .img {
      width: 35%;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .item .img::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 50%, rgba(13, 5, 16, 0.8) 100%);
    }
    .item .body {
      flex: 1;
      padding: 2vh 1.5vw;
      display: flex; flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .item .name {
      font-family: 'Bungee', cursive;
      font-size: 2.4vh;
      color: #fff;
      line-height: 1.1;
      letter-spacing: 0.5px;
    }
    .item .desc {
      font-size: 1.4vh;
      color: #d1d5db;
      line-height: 1.5;
      font-weight: 500;
      margin-top: 0.6vh;
    }
    .item .price-row {
      display: flex; align-items: center; gap: 12px;
      margin-top: 1.5vh;
    }
    .item .price {
      font-family: 'Bungee', cursive;
      font-size: 3.5vh;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }
    .item .price::before {
      content: '$';
      font-size: 2vh;
      color: #fb923c;
      vertical-align: super;
    }
    .badge {
      padding: 0.4vh 1vw;
      background: #ef4444;
      color: white;
      border-radius: 8px;
      font-size: 1.3vh;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      transform: rotate(-3deg);
    }
    .badge.spicy { background: #dc2626; }
    .badge.new { background: #10b981; }
    .badge.popular { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

    /* Spice icon */
    .spicy-icon {
      position: absolute; top: 12px; left: 12px;
      font-size: 3vh;
      z-index: 2;
      filter: drop-shadow(0 0 10px rgba(220, 38, 38, 0.6));
      animation: flame 0.5s ease-in-out infinite alternate;
    }
    @keyframes flame {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 8vh;
      background: linear-gradient(135deg, #ec4899 0%, #f97316 50%, #fbbf24 100%);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4vw;
      z-index: 5;
      border-top: 4px solid #fbbf24;
    }
    .footer .info {
      font-family: 'Bungee', cursive;
      font-size: 2vh;
      color: #0d0510;
      letter-spacing: 1px;
    }
    .footer .info .icon {
      font-size: 2.4vh;
      margin-right: 8px;
    }

    /* Demo controls */
    .demo-controls {
      position: fixed; bottom: 10vh; right: 12px;
      background: rgba(13, 5, 16, 0.9); padding: 10px;
      border-radius: 8px; opacity: 0; transition: opacity 0.3s;
      z-index: 100; font-size: 11px;
      border: 1px solid #ec4899;
    }
    body:hover .demo-controls { opacity: 1; }
    .demo-controls button {
      background: linear-gradient(135deg, #ec4899 0%, #f97316 100%);
      color: white; border: none;
      padding: 6px 10px; border-radius: 6px; margin: 2px;
      cursor: pointer; font-weight: 700; font-size: 10px;
    }
    .demo-controls .label {
      color: #fb923c; font-size: 9px; margin-bottom: 4px;
      letter-spacing: 1px; font-weight: 700;
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="mesh"></div>

  <div class="header">
    <div class="brand">
      <div class="brand-emoji">🌋</div>
      <div class="brand-text">
        <div class="name">Tacos El Volcán</div>
        <div class="sub">Auténtico Mexicano · Ponce</div>
      </div>
    </div>
    <div class="category-tag" id="catTag">🌮 Tacos</div>
  </div>

  <div class="items" id="items"></div>

  <div class="footer">
    <div class="info"><span class="icon">📍</span>Plaza Las Delicias</div>
    <div class="info"><span class="icon">🕒</span>11AM–11PM</div>
    <div class="info"><span class="icon">📱</span>@tacoselvolcan</div>
    <div class="info"><span class="icon">📞</span>787-555-0199</div>
  </div>
</div>

<div class="demo-controls">
  <div class="label">⚙️ Demo</div>
  <button onclick="prevCat()">◀</button>
  <button onclick="nextCat()">▶</button>
  <button onclick="toggleAuto()" id="autoBtn">Pausar</button>
  <button onclick="toggleFullscreen()">⛶</button>
</div>

<script>
const MENU = [
  {
    tag: '🌮 Tacos',
    items: [
      { name: 'Al Pastor', price: 4, desc: 'Cerdo marinado con piña, cebolla y cilantro.', img: 'https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=600&q=80', badge: 'popular', spicy: 2 },
      { name: 'Carne Asada', price: 5, desc: 'Bistec a la parrilla, guacamole y salsa verde.', img: 'https://images.unsplash.com/photo-1604467794349-0b74285de7e7?w=600&q=80', badge: 'popular' },
      { name: 'Birria', price: 6, desc: 'Res estofada con consomé para sumergir.', img: 'https://images.unsplash.com/photo-1611250188496-e966043a0629?w=600&q=80', badge: 'new', spicy: 2 },
      { name: 'Chorizo', price: 4.5, desc: 'Chorizo mexicano con papa y queso.', img: 'https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?w=600&q=80', spicy: 3 },
      { name: 'Camarón', price: 6.5, desc: 'Camarón empanizado con repollo y salsa baja.', img: 'https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600&q=80' },
      { name: 'Vegetariano', price: 4.5, desc: 'Hongos, calabacín y elote asado.', img: 'https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=600&q=80', badge: 'new' },
    ]
  },
  {
    tag: '🌯 Burritos',
    items: [
      { name: 'Burrito Volcán', price: 14, desc: 'Carne asada, frijoles, arroz, guacamole, queso y crema.', img: 'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=600&q=80', badge: 'popular' },
      { name: 'Burrito Pastor', price: 13, desc: 'Al pastor con todos los acompañantes.', img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80' },
      { name: 'California', price: 14, desc: 'Carne asada, papas fritas, queso y guacamole.', img: 'https://images.unsplash.com/photo-1627662235973-78a5dbed9ba0?w=600&q=80' },
      { name: 'Birria Burrito', price: 15, desc: 'Birria con consomé, queso oaxaca derretido.', img: 'https://images.unsplash.com/photo-1582169296194-e4d644c48063?w=600&q=80', badge: 'new', spicy: 2 },
      { name: 'Burrito Mojado', price: 16, desc: 'Burrito bañado en salsa roja y queso gratinado.', img: 'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=600&q=80', spicy: 3 },
      { name: 'Pollo Asado', price: 12, desc: 'Pechuga a la parrilla, frijoles negros y arroz.', img: 'https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?w=600&q=80' },
    ]
  },
  {
    tag: '🌶️ Extras',
    items: [
      { name: 'Quesadilla', price: 8, desc: 'Tortilla de harina con queso oaxaca derretido.', img: 'https://images.unsplash.com/photo-1618040996337-11fe5b9b51e9?w=600&q=80' },
      { name: 'Nachos Supremos', price: 12, desc: 'Totopos, queso, frijoles, carne, guacamole y jalapeños.', img: 'https://images.unsplash.com/photo-1582169296194-e4d644c48063?w=600&q=80', badge: 'popular' },
      { name: 'Elote en Vaso', price: 6, desc: 'Maíz con mayo, queso cotija, chile y limón.', img: 'https://images.unsplash.com/photo-1620638731220-2f87f5d22f10?w=600&q=80', spicy: 2 },
      { name: 'Guacamole + Chips', price: 8, desc: 'Aguacate fresco, cilantro, limón y totopos.', img: 'https://images.unsplash.com/photo-1601979671954-2c2f7c9e15ab?w=600&q=80' },
      { name: 'Frijoles Charros', price: 5, desc: 'Frijoles con tocino, chorizo y cilantro.', img: 'https://images.unsplash.com/photo-1565895405229-71bfa66c0e29?w=600&q=80' },
      { name: 'Arroz Mexicano', price: 4, desc: 'Arroz rojo con maíz y guisantes.', img: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=600&q=80' },
    ]
  },
  {
    tag: '🍹 Bebidas',
    items: [
      { name: 'Horchata', price: 4, desc: 'Bebida de arroz con canela y vainilla.', img: 'https://images.unsplash.com/photo-1525385133512-2f3bdd039054?w=600&q=80' },
      { name: 'Agua de Jamaica', price: 4, desc: 'Flor de hibisco, refrescante y rojo intenso.', img: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=600&q=80' },
      { name: 'Agua de Tamarindo', price: 4, desc: 'Tamarindo fresco con un toque dulce.', img: 'https://images.unsplash.com/photo-1499638673689-79a0b5115d87?w=600&q=80' },
      { name: 'Margarita Clásica', price: 9, desc: 'Tequila, triple sec, limón y sal.', img: 'https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=600&q=80', badge: 'popular' },
      { name: 'Michelada', price: 8, desc: 'Cerveza con salsa, limón y especias.', img: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=600&q=80', spicy: 1 },
      { name: 'Mojito Mexicano', price: 10, desc: 'Tequila, menta, limón y agua mineral.', img: 'https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=600&q=80', badge: 'new' },
    ]
  }
];

const ROTATION_MS = 12000;
let currentIdx = 0;
let autoTimer = null;
let isAuto = true;

function spicyDots(n) {
  if (!n) return '';
  return '<div class="spicy-icon">' + '🌶️'.repeat(n) + '</div>';
}

function badgeHtml(b) {
  if (!b) return '';
  const labels = { popular: '🔥 POPULAR', new: '✨ NUEVO', spicy: '🌶️ PICANTE' };
  return `<div class="badge ${b}">${labels[b] || b}</div>`;
}

function render() {
  const cat = MENU[currentIdx];

  // Tag with animation
  const tagEl = document.getElementById('catTag');
  tagEl.textContent = cat.tag;
  tagEl.style.animation = 'none';
  void tagEl.offsetWidth;
  tagEl.style.animation = 'tagPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';

  // Items
  const items = document.getElementById('items');
  items.innerHTML = cat.items.map(it => `
    <div class="item">
      <div class="img" style="background-image:url('${it.img}')">
        ${spicyDots(it.spicy)}
      </div>
      <div class="body">
        <div>
          <div class="name">${it.name}</div>
          <div class="desc">${it.desc}</div>
        </div>
        <div class="price-row">
          <div class="price">${it.price.toFixed(2)}</div>
          ${badgeHtml(it.badge)}
        </div>
      </div>
    </div>
  `).join('');
}

function nextCat() { currentIdx = (currentIdx + 1) % MENU.length; render(); }
function prevCat() { currentIdx = (currentIdx - 1 + MENU.length) % MENU.length; render(); }
function startAuto() {
  stopAuto();
  autoTimer = setInterval(nextCat, ROTATION_MS);
  isAuto = true;
  const btn = document.getElementById('autoBtn'); if (btn) btn.textContent = 'Pausar';
}
function stopAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = null; isAuto = false;
  const btn = document.getElementById('autoBtn'); if (btn) btn.textContent = 'Auto';
}
function toggleAuto() { if (isAuto) stopAuto(); else startAuto(); }
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') { nextCat(); if(isAuto) startAuto(); }
  if (e.key === 'ArrowLeft')  { prevCat(); if(isAuto) startAuto(); }
  if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

render(); startAuto();
</script>

</body>
</html>
